name: PR Font Build Validation

on: [pull_request]

jobs:
  build:
    name: Build ${{ matrix.fontName }} font
    if: github.repository == 'be5invis/Iosevka'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        fontName:
          [
            "Iosevka",
            "IosevkaFixed",
            "IosevkaSlab",
            "IosevkaAile",
            "IosevkaEtoile",
            "IosevkaNoVarTest",
          ]

    steps:
      # Checkout repository into `iosevka` sub directory
      - uses: actions/checkout@v6
        with:
          path: iosevka

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: iosevka/package-lock.json

      - name: Install ttfautohint
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: ttfautohint

      - name: Build Font ${{ matrix.fontName }}
        shell: bash
        working-directory: iosevka
        run: |
          npm install
          npm run build -- contents::${{ matrix.fontName }}
